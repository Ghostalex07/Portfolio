<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alejandro Blanco | Cybersecurity Portfolio</title>
    <script>
      // Error logging to help debug GitHub Pages issues
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('System Error:', msg, url, lineNo, columnNo, error);
        const root = document.getElementById('root');
        if (root && root.innerText.includes('INITIALIZING_SYSTEM')) {
          root.innerHTML = '<div style="color: #ff4444; padding: 20px; font-family: monospace;">CRITICAL_ERROR: Failed to load system modules. Check console for details.</div>';
        }
        return false;
      };

      // Redirect to trailing slash if missing
      if (window.location.pathname.endsWith('/Portfolio') && !window.location.pathname.endsWith('/Portfolio/')) {
        window.location.replace(window.location.pathname + '/');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div style="background-color: #020617; height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="width: 40px; height: 40px; border: 2px solid #0f172a; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      body { margin: 0; padding: 0; }
    </style>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
