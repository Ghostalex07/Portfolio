<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alejandro Blanco | Cybersecurity Portfolio</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the window to load the correct route for the app.
      (function(l) {
        if (l.search[1] === '/' ) {
          var oi = l.search.lastIndexOf('&');
          var acts = l.search.slice(1, oi).split('&');
          l.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (acts[0] ? acts[0] : '') + (acts[1] ? '&' + acts[1] : '') + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
